name: CLI Bug Report
description: Report a bug in the clictl command-line tool
labels: ["bug", "cli"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Run `clictl version` and paste the output
      placeholder: "v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command that failed
      description: The exact command you ran
      placeholder: "clictl install gstack-ship"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include the full error output if available.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (config, environment, screenshots)
